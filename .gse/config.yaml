# GSE-One Project Configuration
# Generated by /gse:hug — 2026-04-22

# --- Section 1: Project ---
project:
  name: "calcapp"
  domain: "other"

# --- Section 2: Lifecycle ---
lifecycle:
  mode: full                           # filled by /gse:go after Complexity Assessment
  stale_sprint_sessions: 3
  phases:
    LC02:
      deliver: true
      design: true
      preview: true

# --- Section 3: Interaction ---
interaction:
  verbosity: normal
  language:
    chat: fr
    artifacts: en

# --- Section 4: Decisions ---
decisions:
  tier_bias: hands-on                  # supervised profile → hands-on bias
  always_gate:
    - security
    - data-model
    - external-dependency
    - merge-strategy

# --- Section 5: Guardrails ---
guardrails:
  sensitivity: standard

# --- Section 6: Complexity ---
complexity:
  budget_per_sprint: 10

# --- Section 7: Health ---
health:
  disabled_dimensions: []

# --- Section 8: Hooks ---
hooks:
  protect_main: true
  block_force_push: true
  review_findings_on_push: true

# --- Section 9: Git ---
git:
  strategy: worktree
  worktree_dir: .worktrees
  branch_prefix: gse
  merge_strategy_default: squash
  protect_main: true
  auto_commit_on_pause: true
  commit_convention: gse
  tag_on_deliver: true
  cleanup_on_deliver: true
  pre_merge_check: ""
  post_tag_hook: ""
  rollback_on_deploy_failure: true
  backup_before_destructive: true
  backup_retention_days: 30

# --- Section 10: GitHub ---
github:
  enabled: false
  repo: ""
  sync_mode: manual
  auto_close_on_deliver: true
  upstream_repo: ""

# --- Section 11: Testing ---
testing:
  framework: auto
  strategy: auto
  pyramid: auto
  dependency_audit: true
  audit_tool: auto
  visual:
    enabled: false
    tool: playwright
    browsers: [chromium]
    video: false
    video_on_failure_only: true
  coverage:
    tool: auto
    minimum: 60
  environment:
    db_test: auto
    mocks: auto

# --- Section 12: Deploy ---
deploy:
  provider: hetzner
  server_type: cax21
  datacenter: fsn1
  app_type: auto
  health_check_timeout: 120

# --- Section 13: Dashboard ---
dashboard:
  regen_debounce_seconds: 5

# --- Section 14: Compound ---
compound:
  max_proposed_issues_per_sprint: 3

# --- Section 15: Coach ---
coach:
  enabled: true
  max_preambles_per_sprint: 3
  max_advice_per_check: 3
  proactive_gap_detection: true
  axes:
    pedagogy: true
    profile_calibration: true
    sprint_velocity: true
    workflow_health: true
    quality_trends: true
    engagement_pattern: true
    process_deviation: true
    sustainability: true
